<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#fff; display:flex; flex-direction:column; align-items:center; padding:20px; gap:20px; }
  canvas { border:1px solid #eee; max-width:100%; }
  button { padding:10px 20px; background:#C8793C; color:#fff; border:none; cursor:pointer; font-size:14px; }
</style>
</head>
<body>
<button onclick="download()">Save as PNG</button>
<div id="pages"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let canvases = [];

pdfjsLib.getDocument('/logo.pdf').promise.then(pdf => {
  for (let i = 1; i <= pdf.numPages; i++) {
    pdf.getPage(i).then(page => {
      const scale = 3;
      const vp = page.getViewport({ scale });
      const canvas = document.createElement('canvas');
      canvas.width = vp.width;
      canvas.height = vp.height;
      canvases[i] = canvas;
      document.getElementById('pages').appendChild(canvas);
      page.render({ canvasContext: canvas.getContext('2d'), viewport: vp });
    });
  }
});

function download() {
  canvases.forEach((c, i) => {
    if (!c) return;
    const a = document.createElement('a');
    a.download = 'logo-page' + i + '.png';
    a.href = c.toDataURL('image/png');
    a.click();
  });
}
</script>
</body>
</html>
