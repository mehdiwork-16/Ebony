<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 300" fill="none">
  <defs>
    <linearGradient id="g1" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%"   stop-color="#F2D06A"/>
      <stop offset="28%"  stop-color="#D4943A"/>
      <stop offset="58%"  stop-color="#C8793C"/>
      <stop offset="100%" stop-color="#7A3E18"/>
    </linearGradient>
    <linearGradient id="g2" x1="0.2" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#E8C050"/>
      <stop offset="40%"  stop-color="#C8793C"/>
      <stop offset="100%" stop-color="#924E24"/>
    </linearGradient>
  </defs>

  <!-- ── WINE GLASS ── -->
  <!-- Left calligraphic stroke: thick, forms the teardrop loop at top -->
  <path d="
    M 104,192
    C 101,170  92,148  84,124
    C 76,100   68,76   70,52
    C 72,32    82,14   96,12
    C 110,10   120,22  116,38
    C 112,54   98,62   92,76
    C 86,90    90,106  100,110
  "
  stroke="url(#g1)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right stroke: thinner clean curve forming the right wall of the bowl -->
  <path d="
    M 104,192
    C 107,170  114,148  120,122
    C 127,96   134,68   130,42
    C 128,28   122,16   116,12
  "
  stroke="url(#g2)" stroke-width="14" stroke-linecap="round"/>

  <!-- ── TEXT ── -->
  <!-- "EBONY" — E B N Y black, O in gold -->
  <text font-family="Playfair Display, Georgia, serif" font-weight="900" font-size="52" letter-spacing="2">
    <tspan x="14" y="240" fill="#0A0505">EB</tspan><tspan fill="#C8793C">O</tspan><tspan fill="#0A0505">NY</tspan>
  </text>

  <!-- "LOUNGE" small caps tracking -->
  <text x="110" y="262" font-family="Playfair Display, Georgia, serif" font-size="13" font-weight="400"
        letter-spacing="8" fill="#7A6A5A" text-anchor="middle" text-transform="uppercase">LOUNGE</text>

  <!-- Bottom gold accent line -->
  <path d="M 88,275 L 110,285 L 132,275" stroke="url(#g1)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
